<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Invoice Management</title>
    <link rel="stylesheet" href="public/css/style.css">
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <h1>Create Account</h1>
                    <p>Sign up to get started</p>
                </div>
                <form id="register-form" class="login-form">
                    <div class="form-group">
                        <label for="full-name">Full Name</label>
                        <input type="text" id="full-name" name="full-name" required placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required placeholder="Enter your email address">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required placeholder="Enter your password" minlength="6">
                        <small style="color: #6b7280; font-size: 0.875rem;">Password must be at least 6 characters</small>
                    </div>
                    <div id="auth-message" class="auth-message hidden" role="alert"></div>
                    <div class="login-actions">
                        <button type="submit" class="btn btn-primary btn-full">Create Account</button>
                    </div>
                </form>
                <div class="login-footer">
                    <p>Already have an account? <a href="login.html" class="link">Sign In</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
